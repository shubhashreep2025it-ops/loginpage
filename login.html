<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MamaCare — Maternal Health Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --rose: hsl(350, 45%, 65%);
    --rose-light: hsl(350, 50%, 88%);
    --sage: hsl(145, 25%, 72%);
    --sage-light: hsl(145, 20%, 90%);
    --cream: hsl(35, 45%, 95%);
    --peach: hsl(20, 60%, 88%);
    --fg: hsl(20, 25%, 15%);
    --muted: hsl(20, 10%, 45%);
    --border: hsl(30, 20%, 90%);
    --input-bg: hsl(30, 20%, 93%);
    --card-bg: linear-gradient(160deg, rgba(255,255,255,0.95), rgba(252,248,244,0.85));
    --bg: linear-gradient(135deg, var(--cream), hsl(350,40%,94%), var(--sage-light));
    --shadow-warm: 0 8px 30px hsla(350,30%,60%,0.1);
    --shadow-glow: 0 0 20px hsla(350,45%,65%,0.15);
  }

  body { font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; background: var(--bg); color: var(--fg); }

  /* LEFT PANEL */
  .left-panel {
    display: none; width: 50%; flex-direction: column; align-items: center; justify-content: center;
    position: relative; overflow: hidden; padding: 3rem;
  }
  @media(min-width:1024px) { .left-panel { display: flex; } }

  .blob { position: absolute; border-radius: 50%; filter: blur(40px); animation: float 6s ease-in-out infinite; }
  .blob-1 { width: 8rem; height: 8rem; background: hsla(145,25%,72%,0.3); top: 4rem; left: 4rem; }
  .blob-2 { width: 10rem; height: 10rem; background: hsla(350,50%,88%,0.3); bottom: 5rem; right: 5rem; animation-delay: 3s; }
  .blob-3 { width: 5rem; height: 5rem; background: hsla(20,60%,88%,0.4); top: 33%; right: 4rem; animation-delay: 1.5s; }

  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }

  .left-content { position: relative; z-index: 1; text-align: center; max-width: 26rem; }
  .left-content img { width: 320px; height: 320px; object-fit: contain; margin: 0 auto 2rem; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.1)); }
  .left-content h2 { font-size: 1.875rem; font-weight: 700; margin-bottom: 0.75rem; }
  .left-content p { color: var(--muted); line-height: 1.6; margin-bottom: 2rem; }

  .badges { display: flex; justify-content: center; gap: 1.5rem; }
  .badge-item { display: flex; flex-direction: column; align-items: center; gap: 0.375rem; }
  .badge-icon { width: 2.5rem; height: 2.5rem; border-radius: 0.75rem; background: hsla(145,25%,82%,0.6); display: flex; align-items: center; justify-content: center; }
  .badge-icon svg { width: 1.25rem; height: 1.25rem; color: hsl(145,35%,18%); }
  .badge-label { font-size: 0.75rem; color: var(--muted); font-weight: 500; }

  /* RIGHT PANEL */
  .right-panel { width: 100%; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
  @media(min-width:1024px) { .right-panel { width: 50%; padding: 3rem; } }

  .form-card {
    width: 100%; max-width: 28rem; border-radius: 1.5rem; padding: 2rem 2.5rem;
    border: 1px solid var(--border); background: var(--card-bg); box-shadow: var(--shadow-warm);
    backdrop-filter: blur(16px);
  }

  .logo { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1.5rem; }
  .logo-icon { width: 2.25rem; height: 2.25rem; border-radius: 0.75rem; background: hsla(350,45%,65%,0.15); display: flex; align-items: center; justify-content: center; }
  .logo-icon svg { width: 1.25rem; height: 1.25rem; color: var(--rose); fill: var(--rose); }
  .logo span { font-size: 1.125rem; font-weight: 700; letter-spacing: -0.025em; }

  .form-card h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.25rem; }
  .form-card .subtitle { font-size: 0.875rem; color: var(--muted); margin-bottom: 2rem; }

  .field { margin-bottom: 1rem; }
  .field label { display: block; font-size: 0.75rem; font-weight: 500; color: var(--muted); margin-bottom: 0.375rem; }
  .input-wrap {
    position: relative; border-radius: 0.75rem; transition: box-shadow 0.3s;
  }
  .input-wrap:focus-within { box-shadow: var(--shadow-glow); }
  .input-wrap svg { position: absolute; left: 0.875rem; top: 50%; transform: translateY(-50%); width: 1rem; height: 1rem; color: var(--muted); transition: color 0.2s; }
  .input-wrap:focus-within svg { color: var(--rose); }
  .input-wrap input {
    width: 100%; height: 2.75rem; padding-left: 2.5rem; padding-right: 0.875rem;
    border-radius: 0.75rem; border: 1px solid var(--border); background: hsla(30,20%,93%,0.4);
    font-size: 0.875rem; color: var(--fg); outline: none; transition: background 0.2s;
  }
  .input-wrap input:focus { background: #fff; }
  .input-wrap input::placeholder { color: hsla(20,10%,45%,0.6); }
  .input-wrap .toggle-pw { position: absolute; right: 0.875rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--muted); }
  .input-wrap .toggle-pw:hover { color: var(--rose); }

  .row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.5rem; }
  .row label { display: flex; align-items: center; gap: 0.5rem; font-size: 0.75rem; color: var(--muted); cursor: pointer; }
  .row label input { width: 0.875rem; height: 0.875rem; accent-color: var(--rose); }
  .row button { background: none; border: none; font-size: 0.75rem; color: var(--rose); font-weight: 500; cursor: pointer; }
  .row button:hover { text-decoration: underline; }

  .submit-btn {
    width: 100%; height: 2.75rem; border: none; border-radius: 9999px; cursor: pointer;
    background: var(--rose); color: #fff; font-size: 0.875rem; font-weight: 600;
    display: flex; align-items: center; justify-content: center; gap: 0.5rem;
    box-shadow: 0 4px 14px hsla(350,45%,65%,0.2); transition: transform 0.2s, box-shadow 0.2s; margin-top: 1.25rem;
  }
  .submit-btn:hover { transform: scale(1.02); box-shadow: var(--shadow-glow); }
  .submit-btn:active { transform: scale(0.98); }
  .submit-btn svg { width: 1rem; height: 1rem; }

  .divider { display: flex; align-items: center; gap: 0.75rem; margin: 1.5rem 0; }
  .divider span { font-size: 0.75rem; color: var(--muted); }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .social-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
  .social-btn {
    height: 2.5rem; border-radius: 0.75rem; border: 1px solid var(--border); background: hsla(30,20%,93%,0.3);
    font-size: 0.875rem; font-weight: 500; cursor: pointer; transition: background 0.2s, transform 0.15s;
  }
  .social-btn:hover { background: #fff; transform: translateY(-1px); }

  .toggle-text { text-align: center; font-size: 0.875rem; color: var(--muted); margin-top: 1.5rem; }
  .toggle-text button { background: none; border: none; color: var(--rose); font-weight: 600; cursor: pointer; }
  .toggle-text button:hover { text-decoration: underline; }

  .footer-note { text-align: center; font-size: 0.6875rem; color: hsla(20,10%,45%,0.7); margin-top: 1rem; padding: 0 1rem; }

  /* Name field animation */
  .name-field { overflow: hidden; max-height: 0; opacity: 0; transition: max-height 0.3s ease, opacity 0.3s ease, margin 0.3s ease; margin-bottom: 0; }
  .name-field.visible { max-height: 5rem; opacity: 1; margin-bottom: 1rem; }
</style>
</head>
<body>

<!-- LEFT PANEL -->
<div class="left-panel">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="left-content">
    <img src="pregnant.png" alt="Maternal healthcare illustration" />
    <h2>Caring for You &amp; Your Little One</h2>
    <p>Track your pregnancy journey, access expert guidance, and connect with healthcare providers — all in one place.</p>
    <div class="badges">
      <div class="badge-item">
        <div class="badge-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg></div>
        <span class="badge-label">Personalized Care</span>
      </div>
      <div class="badge-item">
        <div class="badge-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg></div>
        <span class="badge-label">HIPAA Secure</span>
      </div>
      <div class="badge-item">
        <div class="badge-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12h.01"/><path d="M15 12h.01"/><path d="M10 16c.5.3 1.2.5 2 .5s1.5-.2 2-.5"/><path d="M19 6.3a9 9 0 0 1 1.8 3.9 2 2 0 0 1 0 3.6 9 9 0 0 1-17.6 0 2 2 0 0 1 0-3.6A9 9 0 0 1 12 3c2 0 3.5 1.1 3.5 2.5s-.9 2.5-2 2.5c-.8 0-1.5-.4-1.5-1"/></svg></div>
        <span class="badge-label">Week-by-Week</span>
      </div>
    </div>
  </div>
</div>

<!-- RIGHT PANEL -->
<div class="right-panel">
  <div class="form-card">
    <div class="logo">
      <div class="logo-icon"><svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg></div>
      <span>MamaCare</span>
    </div>

    <h1 id="formTitle">Welcome back, Mama ❤️</h1>
    <p class="subtitle" id="formSubtitle">Sign in to continue your care journey</p>

    <form id="authForm" onsubmit="event.preventDefault()">
      <div class="field name-field" id="nameField">
        <label>Full Name</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <input type="text" placeholder="Your full name" />
        </div>
      </div>

      <div class="field">
        <label>Email</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
          <input type="email" placeholder="you@example.com" />
        </div>
      </div>

      <div class="field">
        <label>Password</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="pwInput" placeholder="••••••••" />
          <button type="button" class="toggle-pw" onclick="togglePassword()">
            <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <div class="row" id="rememberRow">
        <label><input type="checkbox" /> Remember me</label>
        <button type="button">Forgot password?</button>
      </div>

      <button type="submit" class="submit-btn">
        <span id="submitText">Sign In</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
      </button>
    </form>

    <div class="divider"><span>or</span></div>

    <div class="social-btns">
      <button class="social-btn">Continue with Google</button>
      <button class="social-btn">Continue with Apple</button>
    </div>

    <p class="toggle-text">
      <span id="toggleQuestion">New to MamaCare?</span>
      <button onclick="toggleMode()" id="toggleBtn">Create Account</button>
    </p>
  
<script>
  let isLogin = true;

  function toggleMode() {
    isLogin = !isLogin;
    document.getElementById('formTitle').textContent = isLogin ? 'Welcome back, Mama 💛' : 'Join MamaCare';
    document.getElementById('formSubtitle').textContent = isLogin ? 'Sign in to continue your care journey' : 'Create your account to get started';
    document.getElementById('submitText').textContent = isLogin ? 'Sign In' : 'Create Account';
    document.getElementById('toggleQuestion').textContent = isLogin ? 'New to MamaCare?' : 'Already have an account?';
    document.getElementById('toggleBtn').textContent = isLogin ? 'Create Account' : 'Sign In';
    document.getElementById('nameField').classList.toggle('visible', !isLogin);
    document.getElementById('rememberRow').style.display = isLogin ? 'flex' : 'none';
  }

  function togglePassword() {
    const pw = document.getElementById('pwInput');
    pw.type = pw.type === 'password' ? 'text' : 'password';
  }
</script>
</body>
</html>
